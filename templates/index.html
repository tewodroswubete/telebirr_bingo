<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebirr Payment Validator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a7e07 0%, #064d04 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 620px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0a7e07, #0dbf0a);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .header .account-info {
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            font-size: 13px;
        }

        .form-section {
            padding: 30px;
        }

        .form-section label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-section .hint {
            color: #888;
            font-size: 12px;
            margin-bottom: 12px;
        }

        .form-section textarea {
            width: 100%;
            min-height: 180px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
            line-height: 1.6;
        }

        .form-section textarea:focus {
            outline: none;
            border-color: #0a7e07;
        }

        .form-section textarea::placeholder {
            color: #aaa;
        }

        .btn-validate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0a7e07, #0dbf0a);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .btn-validate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(10, 126, 7, 0.4);
        }

        .btn-validate:active {
            transform: translateY(0);
        }

        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Result popup overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay.active {
            display: flex;
        }

        .popup {
            background: white;
            border-radius: 16px;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-header {
            padding: 30px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .popup-header.success {
            background: linear-gradient(135deg, #0a7e07, #0dbf0a);
            color: white;
        }

        .popup-header.error {
            background: linear-gradient(135deg, #d32f2f, #f44336);
            color: white;
        }

        .popup-header.duplicate {
            background: linear-gradient(135deg, #e65100, #ff9800);
            color: white;
        }

        .popup-header .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .popup-header h2 {
            font-size: 22px;
        }

        .popup-header .subtitle {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .popup-body {
            padding: 25px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #0a7e07;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e8f5e9;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 14px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row .label {
            color: #777;
            font-weight: 500;
        }

        .detail-row .value {
            color: #333;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
        }

        .detail-row .value.amount {
            color: #0a7e07;
            font-size: 20px;
        }

        .detail-row .value.status-completed {
            color: #0a7e07;
        }

        .detail-row .value.status-failed {
            color: #d32f2f;
        }

        .error-list {
            list-style: none;
            padding: 0;
        }

        .error-list li {
            padding: 10px 0;
            color: #d32f2f;
            font-size: 14px;
            border-bottom: 1px solid #fce4ec;
        }

        .error-list li:last-child {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-pdf {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-sms {
            background: #fff3e0;
            color: #e65100;
        }

        .receipt-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #0a7e07;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }

        .receipt-link:hover {
            background: #e8f5e9;
        }

        .btn-close {
            width: 100%;
            padding: 14px;
            background: #f5f5f5;
            color: #333;
            border: none;
            border-radius: 0 0 16px 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-close:hover {
            background: #e0e0e0;
        }

        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Telebirr Payment Validator</h1>
            <p>Verify incoming payments with official receipt validation</p>
            <div class="account-info">{{ my_account_name }} | {{ my_phone }}</div>
            <a href="/flow" style="display:inline-block;margin-top:10px;color:rgba(255,255,255,0.85);font-size:12px;text-decoration:underline;">View System Flow Diagram</a>
        </div>

        <div class="form-section">
            <label for="smsText">Paste the telebirr SMS / notification text:</label>
            <div class="hint">The system will extract the transaction number, fetch the official receipt PDF, and verify the payment was credited to your account.</div>
            <textarea
                id="smsText"
                name="sms_text"
                placeholder="Dear Tewodros
You have received ETB 200.00 from Tamirat Abebe(2519****7711) 240848 on 13/03/2026 21:00:17. Your transaction number is DCD4QNVEX2. Your current E-Money Account balance is ETB 19,155.35.
Thank you for using telebirr
Ethio telecom"></textarea>
            <button class="btn-validate" id="btnValidate" onclick="validatePayment()">
                <span id="btnText">Validate Payment</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </div>
    </div>

    <!-- Result Popup -->
    <div class="overlay" id="overlay">
        <div class="popup">
            <div class="popup-header" id="popupHeader">
                <div class="icon" id="popupIcon"></div>
                <h2 id="popupTitle"></h2>
                <div class="subtitle" id="popupSubtitle"></div>
            </div>
            <div class="popup-body" id="popupBody"></div>
            <button class="btn-close" onclick="closePopup()">Close</button>
        </div>
    </div>

    <script>
        function validatePayment() {
            const text = document.getElementById('smsText').value.trim();
            if (!text) {
                showPopup(false, {errors: ['Please paste the telebirr message text.']});
                return;
            }

            const btn = document.getElementById('btnValidate');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            const formData = new FormData();
            formData.append('sms_text', text);

            fetch('/validate', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                showPopup(data.success, data);
            })
            .catch(err => {
                showPopup(false, {errors: ['Network error. Please try again.']});
            })
            .finally(() => {
                btn.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            });
        }

        function formatAmount(val) {
            if (val === null || val === undefined) return '-';
            return Number(val).toLocaleString('en', {minimumFractionDigits: 2});
        }

        function showPopup(success, data) {
            const overlay = document.getElementById('overlay');
            const header = document.getElementById('popupHeader');
            const icon = document.getElementById('popupIcon');
            const title = document.getElementById('popupTitle');
            const subtitle = document.getElementById('popupSubtitle');
            const body = document.getElementById('popupBody');

            // Handle duplicate transaction
            if (data.is_duplicate) {
                header.className = 'popup-header duplicate';
                icon.textContent = '\u26A0';
                title.textContent = 'Duplicate Transaction!';
                subtitle.textContent = 'This transaction has already been validated';

                let html = '<div class="section-title">This payment was already used</div>';
                if (data.transaction_number) {
                    html += `<div class="detail-row">
                        <span class="label">Transaction No.</span>
                        <span class="value">${data.transaction_number}</span>
                    </div>`;
                }
                if (data.original_amount) {
                    html += `<div class="detail-row">
                        <span class="label">Amount</span>
                        <span class="value">ETB ${formatAmount(data.original_amount)}</span>
                    </div>`;
                }
                if (data.original_payer) {
                    html += `<div class="detail-row">
                        <span class="label">Originally Paid By</span>
                        <span class="value">${data.original_payer}</span>
                    </div>`;
                }
                if (data.original_date) {
                    html += `<div class="detail-row">
                        <span class="label">Payment Date</span>
                        <span class="value">${data.original_date}</span>
                    </div>`;
                }
                if (data.validated_at) {
                    html += `<div class="detail-row">
                        <span class="label">First Validated At</span>
                        <span class="value">${data.validated_at}</span>
                    </div>`;
                }
                html += `<div style="margin-top:15px;padding:12px;background:#fff3e0;border-radius:8px;font-size:13px;color:#e65100;text-align:center;">
                    This transaction number has already been used. Each transaction can only be validated once.
                </div>`;
                if (data.receipt_url) {
                    html += `<a href="${data.receipt_url}" target="_blank" class="receipt-link">View Receipt</a>`;
                }
                body.innerHTML = html;
                overlay.classList.add('active');
                return;
            }

            if (success) {
                header.className = 'popup-header success';
                icon.textContent = '\u2713';
                title.textContent = 'Payment Verified Successfully!';

                const badge = data.pdf_validated
                    ? '<span class="badge badge-pdf">PDF Verified</span>'
                    : '<span class="badge badge-sms">SMS Verified</span>';
                subtitle.innerHTML = data.pdf_validated
                    ? 'Validated from official telebirr receipt PDF'
                    : 'Validated from SMS text (PDF unavailable)';

                let html = '';

                // Amount section
                html += `<div class="detail-row">
                    <span class="label">Amount Received</span>
                    <span class="value amount">ETB ${formatAmount(data.amount)}</span>
                </div>`;

                // Details section
                html += `<div class="section-title">Payment Details ${badge}</div>`;

                if (data.pdf_validated) {
                    // PDF-validated details
                    if (data.payer_name) {
                        html += `<div class="detail-row">
                            <span class="label">Paid By</span>
                            <span class="value">${data.payer_name}</span>
                        </div>`;
                    }
                    if (data.payer_phone) {
                        html += `<div class="detail-row">
                            <span class="label">Payer Phone</span>
                            <span class="value">${data.payer_phone}</span>
                        </div>`;
                    }
                    if (data.credited_party) {
                        html += `<div class="detail-row">
                            <span class="label">Credited To</span>
                            <span class="value">${data.credited_party}</span>
                        </div>`;
                    }
                    if (data.credited_phone) {
                        html += `<div class="detail-row">
                            <span class="label">Credited Phone</span>
                            <span class="value">${data.credited_phone}</span>
                        </div>`;
                    }
                } else {
                    // SMS-only details
                    if (data.sms_sender) {
                        html += `<div class="detail-row">
                            <span class="label">Paid By</span>
                            <span class="value">${data.sms_sender}</span>
                        </div>`;
                    }
                    if (data.account_holder) {
                        html += `<div class="detail-row">
                            <span class="label">Received By</span>
                            <span class="value">${data.account_holder}</span>
                        </div>`;
                    }
                }

                if (data.transaction_number) {
                    html += `<div class="detail-row">
                        <span class="label">Transaction No.</span>
                        <span class="value">${data.transaction_number}</span>
                    </div>`;
                }
                if (data.payment_date || data.sms_date) {
                    html += `<div class="detail-row">
                        <span class="label">Payment Date</span>
                        <span class="value">${data.payment_date || data.sms_date}</span>
                    </div>`;
                }
                if (data.transaction_status) {
                    const statusClass = data.transaction_status.toLowerCase() === 'completed'
                        ? 'status-completed' : 'status-failed';
                    html += `<div class="detail-row">
                        <span class="label">Status</span>
                        <span class="value ${statusClass}">${data.transaction_status}</span>
                    </div>`;
                }

                // Fee breakdown (PDF only)
                if (data.service_fee || data.service_fee_vat || data.total_paid) {
                    html += '<div class="section-title">Fee Breakdown</div>';
                    html += `<div class="detail-row">
                        <span class="label">Settled Amount</span>
                        <span class="value">ETB ${formatAmount(data.amount)}</span>
                    </div>`;
                    if (data.service_fee) {
                        html += `<div class="detail-row">
                            <span class="label">Service Fee</span>
                            <span class="value">ETB ${data.service_fee}</span>
                        </div>`;
                    }
                    if (data.service_fee_vat) {
                        html += `<div class="detail-row">
                            <span class="label">Service Fee VAT</span>
                            <span class="value">ETB ${data.service_fee_vat}</span>
                        </div>`;
                    }
                    if (data.total_paid) {
                        html += `<div class="detail-row">
                            <span class="label">Total Paid</span>
                            <span class="value" style="font-weight:700">ETB ${data.total_paid}</span>
                        </div>`;
                    }
                }

                // PDF note (when using SMS fallback)
                if (data.pdf_note) {
                    html += `<div style="margin-top:12px;padding:10px;background:#fff3e0;border-radius:8px;font-size:12px;color:#e65100;">
                        Note: ${data.pdf_note}
                    </div>`;
                }

                if (data.receipt_url) {
                    html += `<a href="${data.receipt_url}" target="_blank" class="receipt-link">View Official Receipt PDF</a>`;
                }

                body.innerHTML = html;

            } else {
                header.className = 'popup-header error';
                icon.textContent = '\u2717';
                title.textContent = 'Validation Failed';
                subtitle.textContent = 'Payment did not pass validation';

                let html = '<ul class="error-list">';
                (data.errors || []).forEach(err => {
                    html += `<li>${err}</li>`;
                });
                html += '</ul>';

                // Show extracted info
                if (data.transaction_number || data.sms_amount || data.sms_sender) {
                    html += '<div class="section-title">Extracted Information</div>';

                    if (data.transaction_number) {
                        html += `<div class="detail-row">
                            <span class="label">Transaction No.</span>
                            <span class="value">${data.transaction_number}</span>
                        </div>`;
                    }
                    if (data.sms_amount) {
                        html += `<div class="detail-row">
                            <span class="label">Amount</span>
                            <span class="value">ETB ${formatAmount(data.sms_amount)}</span>
                        </div>`;
                    }
                    if (data.sms_type) {
                        html += `<div class="detail-row">
                            <span class="label">Type</span>
                            <span class="value">${data.sms_type}</span>
                        </div>`;
                    }
                    if (data.sms_sender) {
                        html += `<div class="detail-row">
                            <span class="label">From</span>
                            <span class="value">${data.sms_sender}</span>
                        </div>`;
                    }
                    if (data.sms_date) {
                        html += `<div class="detail-row">
                            <span class="label">Date</span>
                            <span class="value">${data.sms_date}</span>
                        </div>`;
                    }
                }

                if (data.receipt_url) {
                    html += `<a href="${data.receipt_url}" target="_blank" class="receipt-link">View Receipt PDF</a>`;
                }

                body.innerHTML = html;
            }

            overlay.classList.add('active');
        }

        function closePopup() {
            document.getElementById('overlay').classList.remove('active');
        }

        // Close popup on overlay click
        document.getElementById('overlay').addEventListener('click', function(e) {
            if (e.target === this) closePopup();
        });

        // Ctrl+Enter to submit
        document.getElementById('smsText').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                validatePayment();
            }
        });
    </script>
</body>
</html>
